<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>โปรแกรมวางแผนสภาพคล่องทางการเงิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --success: #10B981;
            --danger: #EF4444;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #D1D5DB;
        }

        body { 
            font-family: 'Prompt', sans-serif; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        .layout-grid {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr; 
            gap: 25px;
            align-items: start;
        }

        .card { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        h2 { text-align: center; margin-top: 0; margin-bottom: 25px; font-weight: 600; grid-column: 1 / -1; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 1rem; }
        
        .expense-row { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-bottom: 12px; 
        }
        .expense-row input[type="text"] { flex: 2; }
        
        .amount-group { 
            display: flex; 
            align-items: center; 
            flex: 1.5; 
            gap: 8px; 
        }
        .amount-group input[type="number"] { width: 100%; }
        .unit-text { font-size: 0.9rem; color: var(--text-muted); }

        input { 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary); }

        button { 
            padding: 12px 16px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            font-weight: 500;
        }
        .btn-add { background-color: #E0F2FE; color: #0284C7; width: 100%; margin-top: 5px; }
        .btn-add:hover { background-color: #BAE6FD; }
        .btn-delete { background-color: #FEE2E2; color: #B91C1C; padding: 12px; }
        
        .result-panel {
            background-color: #F8FAFC;
            border: 1px solid #E2E8F0;
            padding: 20px;
            border-radius: 12px;
            position: sticky;
            top: 20px;
        }

        .result-panel h3 { margin-top: 0; border-bottom: 2px solid #E2E8F0; padding-bottom: 10px; }
        .flex-between { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .total-line { font-weight: 600; font-size: 1.1rem; border-top: 1px dashed #CBD5E1; padding-top: 10px; margin-top: 10px; }
        
        .status-badge {
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .footer-credit {
            text-align: center;
            margin-top: 40px;
            padding-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .layout-grid { grid-template-columns: 1fr; gap: 15px; }
            .card { padding: 15px; }
            .result-panel { position: static; } 
        }

        @media (max-width: 480px) {
            .expense-row { 
                flex-direction: column; 
                align-items: stretch;
                background: #F9FAFB;
                padding: 10px;
                border-radius: 8px;
                border: 1px solid #E5E7EB;
            }
            .amount-group { margin-top: 5px; }
            .btn-delete { margin-top: 5px; width: 100%; } 
        }
    </style>
</head>
<body>

<h2 style="color: #111827;">แอปประเมินสภาพคล่องทางการเงิน</h2>

<div class="layout-grid">
    <div class="card">
        <div class="form-group">
            <label for="income">1. รายได้รวมต่อเดือน (สูงสุด 1,000,000 บาท)</label>
            <div class="amount-group">
                <input type="number" id="income" max="1000000" placeholder="ระบุรายได้" oninput="if(this.value > 1000000) this.value = 1000000; calculateLiquidity()">
                <span class="unit-text">บาท</span>
            </div>
        </div>

        <div class="form-group">
            <label>2. ค่าใช้จ่ายคงที่ (Fixed Expenses)</label>
            <div id="fixedList"></div>
            <button class="btn-add" onclick="addExpenseRow('fixed')">+ เพิ่มรายการค่าใช้จ่ายคงที่</button>
        </div>

        <div class="form-group">
            <label>3. ค่าใช้จ่ายไม่คงที่ (Variable Expenses)</label>
            <div id="variableList"></div>
            <button class="btn-add" onclick="addExpenseRow('variable')">+ เพิ่มรายการค่าใช้จ่ายไม่คงที่</button>
        </div>
    </div>

    <div class="card result-panel">
        <h3>สรุปผลการประเมิน</h3>
        <div class="flex-between">
            <span>รวมค่าใช้จ่ายคงที่:</span>
            <span><span id="sumFixed">0</span> ฿</span>
        </div>
        <div class="flex-between">
            <span>รวมค่าใช้จ่ายไม่คงที่:</span>
            <span><span id="sumVariable">0</span> ฿</span>
        </div>
        <div class="flex-between total-line">
            <span>รวมค่าใช้จ่ายทั้งหมด:</span>
            <span style="color: var(--danger);"><span id="totalExpense">0</span> ฿</span>
        </div>
        
        <div class="flex-between total-line" style="font-size: 1.2rem; color: var(--primary);">
            <span>กระแสเงินสดสุทธิ:</span>
            <span><span id="netCash">0</span> ฿</span>
        </div>

        <span id="statusText" class="status-badge" style="background-color: #E5E7EB; color: #6B7280;">รอการคำนวณ...</span>
    </div>

    <div class="footer-credit">
        Developed by Bunnasorn Techajumlernsuk, Not for reference 
    </div>
</div>

<script>
    function addExpenseRow(type) {
        const container = document.getElementById(type + 'List');
        const row = document.createElement('div');
        row.className = 'expense-row';
        row.innerHTML = `
            <input type="text" placeholder="ชื่อรายการ">
            <div class="amount-group">
                <input type="number" class="amount-${type}" max="1000000" placeholder="จำนวนเงิน" oninput="if(this.value > 1000000) this.value = 1000000; calculateLiquidity()">
                <span class="unit-text">บาท</span>
            </div>
            <button class="btn-delete" onclick="this.parentElement.remove(); calculateLiquidity()">ลบ</button>
        `;
        container.appendChild(row);
    }

    window.onload = function() {
        addExpenseRow('fixed');
        addExpenseRow('variable');
    };

    function calculateLiquidity() {
        const income = parseFloat(document.getElementById('income').value) || 0;
        
        let fixedTotal = 0;
        document.querySelectorAll('.amount-fixed').forEach(input => { fixedTotal += parseFloat(input.value) || 0; });

        let variableTotal = 0;
        document.querySelectorAll('.amount-variable').forEach(input => { variableTotal += parseFloat(input.value) || 0; });

        const totalExpense = fixedTotal + variableTotal;
        const netCashFlow = income - totalExpense;
        const savingRate = income > 0 ? (netCashFlow / income) * 100 : 0;

        document.getElementById('sumFixed').innerText = fixedTotal.toLocaleString();
        document.getElementById('sumVariable').innerText = variableTotal.toLocaleString();
        document.getElementById('totalExpense').innerText = totalExpense.toLocaleString();
        document.getElementById('netCash').innerText = netCashFlow.toLocaleString();

        const statusText = document.getElementById('statusText');

        if (income === 0 && totalExpense === 0) {
            statusText.innerText = 'รอการคำนวณ...';
            statusText.style.backgroundColor = '#E5E7EB';
            statusText.style.color = '#6B7280';
        } else if (netCashFlow < 0) {
            statusText.innerText = '🔴 วิกฤต (รายจ่ายเกินรายรับ)';
            statusText.style.backgroundColor = '#FECACA';
            statusText.style.color = '#991B1B';
        } else if (savingRate >= 0 && savingRate <= 10) {
            statusText.innerText = '🟡 เฝ้าระวัง (สภาพคล่องตึงตัว)';
            statusText.style.backgroundColor = '#FDE68A';
            statusText.style.color = '#92400E';
        } else {
            statusText.innerText = '🟢 สภาพคล่องดี (มีเงินออม)';
            statusText.style.backgroundColor = '#BBF7D0';
            statusText.style.color = '#166534';
        }
    }
</script>

</body>
</html>
